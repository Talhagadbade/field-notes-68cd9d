name: Build and Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Process
        env:
          AF0E3D: ${{ secrets.AF0E3D }}
          B27DDA: ${{ secrets.B27DDA }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" _site
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('AF0E3D', '')
          sec_b = os.environ.get('B27DDA', '')
          hits = 0
          for target in pathlib.Path('_site').rglob('*.html'):
              try:
                  before = target.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              after = before
              if sec_a:
                  after = after.replace('<!-- b9c495d84cf4eb7813450c -->', sec_a)
              if sec_b:
                  after = after.replace('<!-- dd30d6ce3653a2b1953a8832a20e95 -->', sec_b)
              if after != before:
                  target.write_text(after, encoding='utf-8')
                  hits += 1
          if hits == 0 and (sec_a or sec_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
